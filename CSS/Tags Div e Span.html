<!DOCTYPE html>
<html lang="PT-BR">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tags Div & Span</title>

        <style>

            #topo  {
                background: blue;
            }

            #conteudo {
                background: red;
            }

            #rodape {
                background: green;
            }

            .produto {
                background: grey;
                margin: 10px;
            } 

            #Assinatura {
                background: pink;
            }


            
          

        </style>

    </head>
    <body>

       <div id="topo">  <!--O que é div em CSS?
                    O elemento div é semanticamente neutro: ele não tem qualquer valor semântico, é simplesmente um elemento container.-->

            <img src="imagens/amazon.png" alt="Amazon" width="200">
            <ul> <!--representa uma lista de itens sem ordem rígida,-->
                <li>Home</li> <!--li  é usado para representar um item que faz parte de uma lista-->
                <li>Produtos</li>
                <li>Contato</li>
            </ul>
       </div>

       <div id="conteudo">

        <div class="produto">
            Produto1
        </div>

        <div class="produto">
            Produto2
        </div>

        <div class="produto">
            Produto3
        </div>

        <div id="rodape">
            Todos os direitos reservados
        </div>

       </div>

       <span id="Assinatura">
            Wesley
       </span>

       <span id="">
            Lopes
   </span>
        
    </body>
</html>
