<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilos de textos</title>


    <style>

        body {
            /* A propriedade font-size é usada para indicar o tamanho da letra */
            font-size: 40px;

            /* A font-family propriedade deve conter vários nomes de fontes como um sistema  */
            font-family: 'Times New Roman', Times, serif;
        }

        .negrito {
            /* A propriedade CSS font-weight especifica o peso ou a intensidade da fonte (ex.: negrito) */
            font-weight: bold; 
        }

        .italico {
            /* Font-style - Essa propriedade é usada para definir o estilo da fonte. Ela pode receber o valor normal, italic e oblique. */
            font-style: italic;
        }

        .formatacao {

            /* text-decoration: underline ; */
            /* text-decoration: overline; */
            /* text-decoration: line-through; */
        }

        .texto {
            font: bold 40px "font-family:courier,arial,helvetica;"  ;
        }


    </style>

</head>
<body>

    <p class="negrito">Texto Negrito</p>
    <p  class="italico">Texto Italico</p>
    <p class="formatacao">Formatacao de texto</p>
    <p class="texto">Texto</p>
    <p>Padrão</p>
    
</body>
</html>
