<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamanhos de textos</title>

    <style>

            body {
                font-size: 30px;
            }


        .texto1 {
          /* font-size: 30px; */ 
            /* px -> Tamanho fixo 
            % -> Tamanho relativo
            em -> tamanho relativo ao container pai */
            font-size: 2em;  
        }

        .texto2 {
            font-size: 1.5em;
        }

    </style>

</head>
<body>

    <div>
        <p class="texto1">Conteúdo1</p>
        <p class="texto2">Conteúdo2</p>
    </div>
 
    
    
</body>
</html>
