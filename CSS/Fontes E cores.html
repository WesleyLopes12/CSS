<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes E cores</title>

    <style>

        .formatacao {
            /* O que é CSS color?
                A propriedade CSS color é utilizada para definir a cor do texto em um determinado elemento ou para toda a página */
            color: #23a098;

            /* A propriedade font-size é usada para indicar o tamanho da letra */
            font-size: 20px;

            /* A propriedade font-family do CSS permite que se faça uma lista de prioridades de familias de fontes e/ou nomes genéricos de famílias a serem especificados para um elemento selecionado */
            font-family: "Times New Roman", Times, serif;
           

        }

    </style>

</head>
<body>

   <p class="formatacao">Conteúdo</p>
    
    
</body>
</html>
