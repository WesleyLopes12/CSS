<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordas</title>

    <style>

        /* As propriedades de borda do CSS permitem que você especifique o estilo, a largura e a cor da borda de um elemento. */

        #conteudo {
            /* border: 10px outset red;*/

            /* A border-color propriedade é usada para definir a cor das quatro bordas. */
            border-color: red green yellow blue;

            /* A border-width propriedade especifica a largura das quatro bordas. */
            border-width: 30px 15px 25px 15px;

            /* A border-style propriedade especifica que tipo de borda exibir. */
            border-style: outset;

            /* A background-color propriedade especifica a cor de fundo de um elemento. */
            background: black;
            color: white;
        }

    </style>

</head>
<body>

    <div id="conteudo">
        Bordas <br>
        Bordas <br>
        Bordas <br>
    </div>
    
</body>
</html>
